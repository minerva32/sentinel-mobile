<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sentinel Mini — Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');

:root {
  --bg: #030008;
  --dot-green: #10b981;
  --dot-amber: #f59e0b;
  --dot-purple: #8b5cf6;
}

* { box-sizing:border-box; margin:0; padding:0; }

body {
  background: #030008;
  height: 100vh; width: 100vw;
  display: flex; justify-content: center; align-items: center;
  overflow: hidden;
}

.phone {
  width: 390px; height: 844px;
  background: #030008;
  background-image:
    radial-gradient(ellipse at 50% 38%, rgba(99,102,241,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 38%, rgba(6,182,212,0.03) 0%, transparent 80%);
  border-radius: 44px;
  border: 2px solid rgba(147,51,234,0.15);
  box-shadow: 0 0 80px rgba(99,102,241,0.08), 0 30px 90px rgba(0,0,0,0.6);
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* === TOP BAR — barely there === */
.top-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 28px 0;
  flex-shrink: 0; z-index: 2;
}
.top-bar .time {
  font-family: 'Orbitron', sans-serif;
  font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 1px;
}
.top-bar .status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--dot-green);
  box-shadow: 0 0 10px var(--dot-green), 0 0 20px rgba(16,185,129,0.4);
  transition: all 0.6s ease;
}

/* === ORB — the star === */
.orb-zone {
  flex: 1; display: flex; align-items: center; justify-content: center;
  position: relative; min-height: 0;
}
.orb-zone canvas {
  width: 100%; height: 100%;
  filter: drop-shadow(0 0 40px rgba(99,102,241,0.25));
  cursor: pointer;
}

/* === BOTTOM — whisper of UI === */
.bottom-whisper {
  display: flex; justify-content: center; align-items: center;
  padding: 0 32px 40px;
  gap: 24px;
  flex-shrink: 0; z-index: 2;
}
.mic-ring {
  width: 64px; height: 64px; border-radius: 50%;
  border: 1.5px solid rgba(16,185,129,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; cursor: pointer;
  background: rgba(16,185,129,0.04);
  transition: all 0.4s ease;
  backdrop-filter: blur(8px);
}
.mic-ring:hover, .mic-ring.active {
  border-color: rgba(16,185,129,0.7);
  box-shadow: 0 0 30px rgba(16,185,129,0.15);
  background: rgba(16,185,129,0.08);
}
.sub-btn {
  width: 40px; height: 40px; border-radius: 14px;
  border: 1px solid rgba(147,51,234,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; cursor: pointer;
  background: transparent;
  transition: all 0.3s ease;
  color: rgba(255,255,255,0.25);
}
.sub-btn:hover { color: rgba(255,255,255,0.6); border-color: rgba(147,51,234,0.3); }

/* === Pulse === */
@keyframes micPulse {
  0%,100% { box-shadow: 0 0 20px rgba(16,185,129,0.08); }
  50% { box-shadow: 0 0 40px rgba(16,185,129,0.2); }
}
.mic-ring.pulsing { animation: micPulse 2s infinite; }
</style>
</head>
<body>

<div class="phone">
  <!-- Top bar: time + status dot -->
  <div class="top-bar">
    <span class="time">12:44</span>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <!-- Orb -->
  <div class="orb-zone">
    <canvas id="orb" width="780" height="1200"></canvas>
  </div>

  <!-- Bottom: mic + whisper buttons -->
  <div class="bottom-whisper">
    <div class="sub-btn" title="Log">💬</div>
    <div class="mic-ring pulsing" id="micBtn" title="Voice">🎤</div>
    <div class="sub-btn" title="More">⋯</div>
  </div>
</div>

<script>
const canvas = document.getElementById('orb');
const ctx = canvas.getContext('2d');
let W, H, t = 0;
let mouseX = 0.5, mouseY = 0.5, targetMX = 0.5, targetMY = 0.5;

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  W = canvas.width = rect.width * 2;
  H = canvas.height = rect.height * 2;
}
resize();
window.addEventListener('resize', resize);

// Touch/mouse follow
canvas.addEventListener('pointermove', e => {
  const rect = canvas.getBoundingClientRect();
  targetMX = (e.clientX - rect.left) / rect.width;
  targetMY = (e.clientY - rect.top) / rect.height;
});

// === Star nodes ===
const stars = [];
const STAR_COUNT = 60;
for (let i = 0; i < STAR_COUNT; i++) {
  const dist = 55 + Math.random() * 140;
  stars.push({
    baseAngle: Math.random() * Math.PI * 2,
    baseRadius: dist,
    angleSpeed: 0.08 + Math.random() * 0.4,
    radiusOsc: 0.3 + Math.random() * 1.2,
    size: 0.6 + Math.random() * 2.8,
    alpha: 0.2 + Math.random() * 0.9,
    hue: Math.random() < 0.7 ? 260 + Math.random() * 30 : 185 + Math.random() * 15,
    flicker: Math.random() * Math.PI * 2,
    flickerSpeed: 0.02 + Math.random() * 0.06,
    orbitTilt: 0.2 + Math.random() * 0.5,
  });
}

// Constellation lines
const edges = [];
for (let i = 0; i < stars.length; i++) {
  for (let j = i + 1; j < stars.length; j++) {
    const dr = Math.abs(stars[i].baseRadius - stars[j].baseRadius);
    const da = Math.abs(stars[i].baseAngle - stars[j].baseAngle);
    const dist = Math.sqrt(dr * dr + da * da * 80);
    if (dist < 35 && Math.random() < 0.15) {
      edges.push({ a: i, b: j, alpha: 0.04 + Math.random() * 0.08 });
    }
  }
}

function starShape(ctx, x, y, size, alpha) {
  const spikes = 4;
  const outerR = size * 2.2;
  const innerR = size * 0.6;
  ctx.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const a = (i * Math.PI) / spikes - Math.PI / 2;
    const sx = x + Math.cos(a) * r;
    const sy = y + Math.sin(a) * r;
    i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  }
  ctx.closePath();
}

function draw() {
  t += 0.016;
  mouseX += (targetMX - mouseX) * 0.03;
  mouseY += (targetMY - mouseY) * 0.03;

  ctx.clearRect(0, 0, W, H);

  const cx = W / 2 + (mouseX - 0.5) * 30;
  const cy = H / 2 + (mouseY - 0.5) * 30 - H * 0.02;

  // === Deep ambient glow ===
  const bgGlow = ctx.createRadialGradient(cx, cy, 20, cx, cy, 280);
  bgGlow.addColorStop(0, 'rgba(99,102,241,0.06)');
  bgGlow.addColorStop(0.4, 'rgba(99,102,241,0.02)');
  bgGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = bgGlow;
  ctx.fillRect(0, 0, W, H);

  // === Constellation lines ===
  const starPositions = [];
  for (const s of stars) {
    const angle = s.baseAngle + t * s.angleSpeed * 0.3;
    const r = s.baseRadius + Math.sin(t * s.radiusOsc + s.flicker) * 12;
    const sx = cx + Math.cos(angle) * r;
    const sy = cy + Math.sin(angle) * r * s.orbitTilt;
    starPositions.push({ x: sx, y: sy, alpha: s.alpha, hue: s.hue, flicker: s.flicker, flickerSpeed: s.flickerSpeed });
  }
  for (const e of edges) {
    const a = starPositions[e.a], b = starPositions[e.b];
    const lineAlpha = Math.min(a.alpha, b.alpha) * e.alpha * 4;
    if (lineAlpha < 0.02) continue;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = `rgba(147,51,234,${lineAlpha})`;
    ctx.lineWidth = 0.4;
    ctx.stroke();
  }

  // === Orbital rings ===
  for (let ring = 0; ring < 2; ring++) {
    const rr = 58 + ring * 20;
    ctx.beginPath();
    ctx.ellipse(cx, cy, rr, rr * 0.3, t * 0.2 + ring * 1.5, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(147,51,234,${0.12 - ring * 0.04})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // === Core orb — layered ===
  for (let l = 4; l >= 0; l--) {
    const r = 30 + l * 16 + Math.sin(t * 1.8 + l) * 5;
    const grad = ctx.createRadialGradient(cx, cy, r * 0.15, cx, cy, r);
    grad.addColorStop(0, `rgba(192,132,252,${0.15 - l * 0.02})`);
    grad.addColorStop(0.5, `rgba(99,102,241,${0.06 - l * 0.01})`);
    grad.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = grad; ctx.fill();
  }

  // Core bright center
  const core = ctx.createRadialGradient(cx - 3, cy - 5, 2, cx, cy, 28);
  core.addColorStop(0, 'rgba(255,255,255,0.95)');
  core.addColorStop(0.15, 'rgba(221,214,254,0.7)');
  core.addColorStop(0.5, 'rgba(147,51,234,0.2)');
  core.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(cx, cy, 28, 0, Math.PI * 2);
  ctx.fillStyle = core; ctx.fill();

  // === Stars ===
  for (const sp of starPositions) {
    const flickerAlpha = sp.alpha * (0.65 + 0.35 * Math.sin(t * sp.flickerSpeed * 30 + sp.flicker));
    if (flickerAlpha < 0.05) continue;

    const hueColor = sp.hue < 200
      ? `rgba(6,182,212,${flickerAlpha})`
      : `rgba(192,132,252,${flickerAlpha})`;

    // Glow
    const g = ctx.createRadialGradient(sp.x, sp.y, 0, sp.x, sp.y, sp.size * 8);
    g.addColorStop(0, hueColor);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.size * 8, 0, Math.PI * 2); ctx.fill();

    // Star shape
    ctx.fillStyle = hueColor;
    starShape(ctx, sp.x, sp.y, sp.size, flickerAlpha);
    ctx.fill();

    // Bright center
    ctx.fillStyle = `rgba(255,255,255,${flickerAlpha * 0.7})`;
    ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.size * 0.35, 0, Math.PI * 2); ctx.fill();
  }

  // === Satellite nodes (larger, pilot stars) ===
  const satellites = [
    { angle: t * 0.35, radius: 72, size: 3.5, hue: '6,182,212' },
    { angle: t * 0.35 + Math.PI * 0.7, radius: 82, size: 3, hue: '192,132,252' },
    { angle: t * 0.35 + Math.PI * 1.35, radius: 68, size: 2.8, hue: '147,51,234' },
  ];
  for (const sat of satellites) {
    const sx = cx + Math.cos(sat.angle) * sat.radius;
    const sy = cy + Math.sin(sat.angle) * sat.radius * 0.3;
    // Glow ring
    const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, sat.size * 10);
    sg.addColorStop(0, `rgba(${sat.hue},0.6)`);
    sg.addColorStop(1, 'transparent');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.arc(sx, sy, sat.size * 10, 0, Math.PI * 2); ctx.fill();
    // Star
    ctx.fillStyle = `rgba(${sat.hue},0.9)`;
    starShape(ctx, sx, sy, sat.size, 0.9);
    ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(sx, sy, sat.size * 0.45, 0, Math.PI * 2); ctx.fill();
  }

  requestAnimationFrame(draw);
}

// Force initial render for headless capture
resize();
draw();

// Double-tap: ensure frame renders even in headless
setTimeout(() => { resize(); draw(); }, 50);
setTimeout(() => { resize(); draw(); }, 200);

// Color dot click cycles states
const dot = document.getElementById('statusDot');
const states = ['#10b981','#6366f1','#f59e0b','#06b6d4'];
let si = 0;
dot.addEventListener('click', () => {
  si = (si + 1) % states.length;
  const c = states[si];
  dot.style.background = c;
  dot.style.boxShadow = `0 0 10px ${c}, 0 0 20px ${c}44`;
});
</script>

</body>
</html>
